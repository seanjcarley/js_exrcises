			function getSum(a, b, n) {
                // alert("GetSum Called")
                let result = 0;
                let num = 0;
                while (num < n) {
                    if (num % a === 0 || num % b === 0) {
                        result += num;
                    }
                    num += 1;
                }
                return result;
            }
