<html>
    <head>
        <script>
            function getSum(a, b, n) {
                let result = 0;
                let num = 0;
                while (num < n) {
                    if (num % a === 0 || num % b === 0) {
                        result += num
                    }
                    num += 1
                }
                
                alert(result);

            }

            getSum(3, 5, 1000)
        </script>
    </head>
    
</html>
