        <!-- Q4 -->
         <script>
            function f4(a, b, c){
                let result = 0;
                let num = 0;
                while (num < length(c)){
                    if (a % c[num] === 0 || b % c[num] === 0){
                        result += c[num];
                    }
                    num += 1;
                }
                return result
            }
            alert(f4(3, 5, [15, 17, 35]))
         </script>
